name: iOS Build Success

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'manual'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean Environment
        run: |
          # Eliminamos archivos que pueden causar cortocircuitos en el servidor Mac
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          # Quitamos sharp de raíz porque no es necesaria para el build de iOS y rompe el CI
          sed -i.bak '/"sharp":/d' package.json

      - name: Install dependencies
        run: |
          # Instalación ultra-limpia ignorando scripts de compilación nativos
          npm install --legacy-peer-deps --ignore-scripts --no-audit

      - name: Build Web Project
        run: |
          # Usamos vite directamente para saltar tsc y asegurar que el build web se genere
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver dependencias de SPM (Capacitor 6)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario nativo (Debug)
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Empaquetamos el resultado para que lo puedas descargar
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -rq app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 1
