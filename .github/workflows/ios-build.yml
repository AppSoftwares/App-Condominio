name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: 'ios/App'
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Debug'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web Project
        run: npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build App
        run: |
          cd "${{ inputs.ios_path }}"
          # Si no hay workspace, usamos el project
          if [ -f "App.xcworkspace" ]; then
            xcodebuild -workspace App.xcworkspace -scheme App -configuration "${{ inputs.configuration }}" -destination 'generic/platform=iOS' -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" CODE_SIGNING_ALLOWED=NO -quiet build
          else
            xcodebuild -project App.xcodeproj -scheme App -configuration "${{ inputs.configuration }}" -destination 'generic/platform=iOS' -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" CODE_SIGNING_ALLOWED=NO -quiet build
          fi
          
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/${{ inputs.configuration }}-iphoneos" -name "*.app" -type d | head -1)
          mkdir -p "${GITHUB_WORKSPACE}/build/Payload"
          cp -R "$APP_PATH" "${GITHUB_WORKSPACE}/build/Payload/"
          cd "${GITHUB_WORKSPACE}/build"
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
