name: iOS Build IPA

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Nombre del archivo base'
        required: true
        default: 'CaminosApp'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install pnpm
        run: npm install -g pnpm@9.15.4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create .env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Build Web Project
        run: pnpm run build:ci

      - name: Generate Assets
        run: |
          npx @capacitor/assets generate --iconBackgroundColor '#0f5551' --iconBackgroundColorDark '#0f5551'
          find android/app/src/main/res -name "*.webp" -delete || true

      - name: Capacitor Sync
        run: npx cap sync

      - name: Build Android App (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare Android Artifact
        run: |
          mv android/app/build/outputs/apk/release/CaminosApp-v2.2.6.apk "CaminosApp v2.2.6.apk"

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          xcodebuild -project App.xcodeproj \
                    -scheme App \
                    -configuration Debug \
                    -destination 'generic/platform=iOS' \
                    -sdk iphoneos \
                    -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    COMPILER_INDEX_STORE_ENABLE=NO \
                    build

      - name: Create IPA for Sideloadly
        run: |
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -rq "CaminosApp v2.2.6.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.2.6
          name: "CaminosApp v2.2.6"
          files: |
            *.ipa
            *.apk
          body: |
            Actualización CaminosApp v2.2.6
            - Cierre de Sesión: Mayor fiabilidad con limpieza forzada de estado local.
            - Soporte: Nueva dirección de correo desarollodeappcondominio@gmail.com.
            - Quejas: Generación automática de comprobante en PDF al enviar una incidencia.
            - UX: Campo de número de casa optimizado con teclado numérico/tel (soporta guiones).
            - Admin: Restricción de gestión de conjuntos solo para Super Admin.
            - Visualización: Apertura corregida de comprobantes PDF en panel admin.
            - Diseño: Pantalla de inicio adaptable a todos los tamaños de pantalla Android.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
