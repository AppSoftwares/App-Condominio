name: iOS Build IPA

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Nombre del archivo IPA (ej. CaminosApp-v1)'
        required: true
        default: 'CaminosApp'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.15.4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create .env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Build Web Project
        run: pnpm run build:ci

      - name: Generate Assets
        run: npx @capacitor/assets generate --ios

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          xcodebuild -project App.xcodeproj \
                    -scheme App \
                    -configuration Debug \
                    -destination 'generic/platform=iOS' \
                    -sdk iphoneos \
                    -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    COMPILER_INDEX_STORE_ENABLE=NO \
                    build

      - name: Create IPA for Sideloadly
        run: |
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -rq "${{ inputs.build_id }}.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.build_id }}-Artifact
          path: "*.ipa"
          retention-days: 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.6
          name: Release v2.1.6
          files: "*.ipa"
          body: |
            Actualización de iOS CaminosApp v2.1.6
            - UI del modal de actualización totalmente optimizada.
            - Corrección de recortes en pantallas de diversos tamaños.
            - Mejoras en la accesibilidad de botones.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}