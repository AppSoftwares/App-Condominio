name: iOS Build Success

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build Identifier'
        required: true
        default: 'v1'

env:
  # Mata el error de versiones de raíz
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Clean Environment
        run: |
          rm -rf node_modules
          rm -f package-lock.json pnpm-lock.yaml .npmrc
          # Desactivamos sharp para que no rompa la instalación en Mac
          export SHARP_IGNORE_GLOBAL_LIBVIPS=1

      - name: Install Dependencies
        run: |
          # Instalación rápida ignorando scripts nativos que fallan en CI
          npm install --legacy-peer-deps --ignore-scripts --no-audit

      - name: Build Web Project
        run: |
          # Build directo de Vite saltando errores de TypeScript
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver dependencias de Capacitor 6 (SPM)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario nativo
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Empaquetamos el .app en un .ipa para descarga directa
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -rq app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: app.ipa
          retention-days: 1
