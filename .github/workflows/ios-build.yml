name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'v1'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: List Files (Debug)
        run: |
          pwd
          ls -R ios/App

      - name: Install dependencies
        run: |
          rm -f package-lock.json pnpm-lock.yaml .npmrc
          npm install --legacy-peer-deps --ignore-scripts

      - name: Build Web
        run: npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Xcode Build
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -rq app.ipa Payload
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app.ipa
