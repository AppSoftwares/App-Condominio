name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
        default: 'v1'

env:
  # Solución definitiva para el error de entorno de GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Clean and Install
        run: |
          # Limpiamos rastros de instalaciones previas
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          pnpm install --no-frozen-lockfile

      - name: Build Web (Vite)
        run: |
          # Compilamos saltando TypeScript para evitar que el CI se detenga por avisos
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Xcode Build (No Signing)
        run: |
          cd ios/App
          # Resolvemos paquetes de Apple
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilamos el binario directamente
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Package IPA
        run: |
          # Buscamos el .app y lo metemos en un .ipa
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: build/*.ipa
          retention-days: 1
