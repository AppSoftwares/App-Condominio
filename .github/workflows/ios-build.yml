name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'ID de compilación'
        required: true
        default: 'manual-v1'

jobs:
  build:
    # CAMBIO CRITICO: macos-14 es mucho más rápido y tiene disponibilidad inmediata
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: |
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build Web Project
        run: pnpm run build:ci

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Capacitor 6 usa SPM por defecto
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: "*.ipa"
          retention-days: 1
