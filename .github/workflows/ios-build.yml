name: iOS Build (Final Fix)

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'v1'

env:
  # Eliminamos los avisos de Node 20 de raíz
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fix package.json for CI
        run: |
          # Evitamos que sharp rompa la instalación en el servidor
          sed -i '' 's/"sharp": "/"_sharp_": "/g' package.json
          rm -f pnpm-lock.yaml package-lock.json .npmrc

      - name: Install dependencies
        run: |
          # Instalación limpia ignorando scripts nativos que fallan en Mac
          npm install --legacy-peer-deps --no-audit --ignore-scripts

      - name: Build Web Project
        run: |
          # Generamos el build de Vite saltando errores de TypeScript
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver dependencias de SPM (Capacitor 6)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar proyecto directamente
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Empaquetamos el .app en un archivo descargable
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/*.ipa
          retention-days: 1
