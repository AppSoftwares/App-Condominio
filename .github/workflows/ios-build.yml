name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'manual'

env:
  # Cumplimos con la exigencia de GitHub de Junio 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install Dependencies
        run: |
          # Solo queda pnpm-lock.yaml, así que será una instalación limpia
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build Web Project
        run: |
          # Saltamos tsc para evitar bloqueos por errores de tipos
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver dependencias SPM
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario nativo
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/App/build -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" Payload/
          zip -rq app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 1
