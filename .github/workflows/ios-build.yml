name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
        default: 'v1'

env:
  # Esto le dice a todas las piezas de GitHub que usen Node 24 sí o sí
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          # Limpiamos archivos locales que confunden al servidor
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          npm install --legacy-peer-deps --no-audit

      - name: Build Web Project
        run: |
          # Compilamos saltando TypeScript (tsc) para que no nos frene ningún error de código
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          
          # 1. Resolver paquetes de Apple (SPM)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # 2. Compilar binario (Debug es más rápido para probar)
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
          # 3. Empaquetar en .ipa
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se generó el archivo .app"
            exit 1
          fi
          
          mkdir -p "${GITHUB_WORKSPACE}/build/Payload"
          cp -R "$APP_PATH" "${GITHUB_WORKSPACE}/build/Payload/"
          cd "${GITHUB_WORKSPACE}/build"
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-manual
          path: build/*.ipa
          retention-days: 1
