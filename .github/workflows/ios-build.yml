name: iOS Build Success

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'manual'

env:
  # Forzamos Node 24 para cumplir con la norma de GitHub de Junio 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean Environment
        run: |
          # 1. Quitar sharp y tsc para evitar el error "Exit Code 1"
          sed -i.bak '/"sharp":/d' package.json
          sed -i.bak 's/tsc && //g' package.json
          # 2. Borrar lockfiles para que GitHub no intente seguir reglas de Windows
          rm -f package-lock.json pnpm-lock.yaml .npmrc
          rm -rf node_modules

      - name: Install dependencies
        run: |
          # Instalación fresca sin ejecutar scripts que rompan el Mac
          npm install --legacy-peer-deps --ignore-scripts --no-audit

      - name: Build Web Project
        run: |
          # Build directo de Vite
          npm run build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Xcode Build
        run: |
          cd ios/App
          # Resolver dependencias de Apple (Capacitor 6 SPM)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Empaquetamos el binario para descarga
          mkdir -p Payload
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" Payload/
          zip -rq app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 1
