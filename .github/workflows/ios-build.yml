name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'v1'

env:
  # Solución para el aviso de Node deprecado
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean and Install
        run: |
          # Evitamos que sharp rompa el build en el servidor
          export SHARP_IGNORE_GLOBAL_LIBVIPS=1
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          npm install --legacy-peer-deps --ignore-scripts --no-audit

      - name: Build Web Project
        run: |
          # Build directo de Vite (sin tsc para evitar bloqueos)
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Xcode Build
        run: |
          cd ios/App
          # Resolver dependencias de Swift (Capacitor 6 SPM)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario nativo (Debug)
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Empaquetamos el .app en un .ipa para que puedas descargarlo
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -rq app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-manual
          path: app.ipa
          retention-days: 1
