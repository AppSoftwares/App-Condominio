name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'ID'
        required: true
        default: 'v1'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node (Stable LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          # Limpieza preventiva
          rm -f package-lock.json pnpm-lock.yaml .npmrc
          # Instalación ignorando scripts nativos (como sharp) que rompen el build
          npm install --legacy-peer-deps --ignore-scripts --no-audit

      - name: Build Web Project
        run: |
          # Usamos vite directamente para saltar errores de TypeScript
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build App
        run: |
          cd ios/App
          # Resolver dependencias de Capacitor 6
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar binario nativo
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          # Localizar el archivo .app generado y empaquetarlo
          APP_PATH=$(find ios/App/build -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" Payload/
          zip -rq app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: app.ipa
          retention-days: 1
