name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: 'ios/App'
      scheme:
        description: 'Xcode scheme'
        required: false
        type: string
        default: 'App'
      configuration:
        description: 'Configuration'
        required: false
        type: string
        default: 'Debug'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          echo "--- SISTEMA ---"
          node -v
          npm -v
          pwd
          ls -la
          echo "--- INTENTANDO INSTALACIÓN ---"
          npm install --legacy-peer-deps || (echo "FALLÓ NPM, PROBANDO CON LOGS" \u0026\u0026 npm install --legacy-peer-deps --verbose)

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build App
        run: |
          cd ${{ inputs.ios_path }}
          xcodebuild -workspace App.xcworkspace -scheme ${{ inputs.scheme }} -configuration ${{ inputs.configuration }} -destination 'generic/platform=iOS' -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" CODE_SIGNING_ALLOWED=NO -quiet build
          
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/${{ inputs.configuration }}-iphoneos" -name "*.app" -type d | head -1)
          mkdir -p "${GITHUB_WORKSPACE}/build/Payload"
          cp -R "$APP_PATH" "${GITHUB_WORKSPACE}/build/Payload/"
          cd "${GITHUB_WORKSPACE}/build"
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
