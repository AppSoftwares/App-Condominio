name: iOS Build Success

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'v1'

env:
  # Comando maestro para silenciar todos los errores de versiones de GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          # Limpiamos para evitar conflictos entre Windows y Mac
          rm -f package-lock.json pnpm-lock.yaml .npmrc
          npm install --legacy-peer-deps --no-audit --ignore-scripts

      - name: Build Web Project (Strict CI Mode)
        run: |
          # Usamos el nuevo comando que salta el chequeo de TypeScript
          npm run build:ci

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver dependencias de SPM (Capacitor 6 standard)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Empaquetamos el .app generado en un .ipa
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el .app"
            exit 1
          fi
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-final
          path: build/*.ipa
          retention-days: 1
