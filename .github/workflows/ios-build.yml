name: iOS Build Success

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
        default: 'manual'

env:
  # Cumplimos con la exigencia de GitHub de Junio 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean Slate
        run: |
          # Borramos lockfiles de Windows para evitar conflictos en Mac
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          # Quitamos sharp de raíz, no es necesaria para el build de iPhone
          sed -i.bak '/"sharp":/d' package.json

      - name: Install dependencies (Lightweight)
        run: |
          # Instalación sin scripts para evitar errores de compilación nativa en el CI
          npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Build Web Project
        run: |
          # Build directo de Vite saltando TypeScript
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build App
        run: |
          cd ios/App
          # Detectar el nombre del proyecto automáticamente
          PROJECT_NAME=$(ls -d *.xcodeproj | sed 's/\.xcodeproj//')
          echo "Building project: $PROJECT_NAME"
          
          # Resolver dependencias de Apple (SPM)
          xcodebuild -resolvePackageDependencies -project "$PROJECT_NAME.xcodeproj"
          
          # Compilar binario nativo
          xcodebuild -project "$PROJECT_NAME.xcodeproj" \
                     -scheme "$PROJECT_NAME" \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Empaquetamos el .app generado
          mkdir -p Payload
          APP_PATH=$(find ios/App/build -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" Payload/
          zip -rq app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 1
