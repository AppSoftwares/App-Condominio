name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build Identifier'
        required: true
        default: 'v1'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          # Limpiamos para evitar conflictos entre Windows y Mac
          rm -f package-lock.json pnpm-lock.yaml .npmrc
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build Web
        run: npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Xcode Build
        run: |
          cd ios/App
          # Resolver dependencias SPM (Capacitor 6)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el proyecto nativo
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -rq app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: app.ipa
          retention-days: 1
