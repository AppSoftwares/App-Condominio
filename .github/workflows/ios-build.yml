name: iOS Build Success

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build Identifier'
        required: true
        default: 'manual-v1'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean Environment
        run: |
          # Limpiamos para evitar cualquier conflicto de Windows en Mac
          rm -rf node_modules dist
          rm -f pnpm-lock.yaml package-lock.json .npmrc

      - name: Install dependencies
        run: |
          # Instalación ultra-limpia sin scripts nativos para evitar el "Exit Code 1"
          npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Build Web Project
        run: |
          # Usamos vite directamente para saltar errores de TypeScript
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver paquetes de Swift Package Manager
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario nativo directamente (Debug)
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Localizamos el .app y lo empaquetamos
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: build/app.ipa
          retention-days: 1
