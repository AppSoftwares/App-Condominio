name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: false
        type: string
        default: 'v1'
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: 'ios/App'
      scheme:
        description: 'Xcode scheme'
        required: false
        type: string
        default: 'App'
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Configuration'
        required: false
        type: string
        default: 'Debug'

jobs:
  build:
    # Usamos macos-14 que es el estándar para builds de iOS en 2026
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24 (Required by GitHub)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean Environment
        run: |
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          # Limpiamos node_modules si existiera por error en el commit
          rm -rf node_modules

      - name: Install dependencies
        run: |
          # Instalación limpia ignorando errores de scripts nativos no críticos
          npm install --legacy-peer-deps --ignore-scripts --no-audit

      - name: Build Web Project
        run: |
          # Ejecutamos el build web directamente con vite
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build App (Xcode)
        run: |
          cd ios/App
          # Resolver paquetes de Swift Package Manager
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el binario
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          # Localizamos el .app y lo empaquetamos
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/*.ipa
          retention-days: 1
