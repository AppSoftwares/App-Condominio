name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path'
        required: false
        type: string
        default: 'ios/App'
      scheme:
        description: 'Scheme'
        required: false
        type: string
        default: 'App'
      use_signing:
        description: 'Signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Config'
        required: false
        type: string
        default: 'Debug'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: |
          rm -f package-lock.json pnpm-lock.yaml .npmrc
          npm install --legacy-peer-deps --ignore-scripts

      - name: Build Web
        run: npm run build:ci

      - name: Sync
        run: npx cap sync ios

      - name: Xcode
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          xcodebuild -project App.xcodeproj \
                     -scheme "App" \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     -quiet build
          
      - name: Export
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/App/build -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" Payload/
          zip -rq app.ipa Payload
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa
