name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'ID'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        run: |
          node -v
          npm -v
          ls -R
