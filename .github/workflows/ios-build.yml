name: iOS Build Success

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'ID de compilación'
        required: true
        default: 'manual'

env:
  # Solo dejamos esta para cumplir con la nueva norma de GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Clean and Prepare
        run: |
          # Eliminar sharp y rastros locales para evitar fallos en Mac
          sed -i.bak '/"sharp":/d' package.json
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          rm -rf node_modules

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build Web Project
        run: npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver paquetes de Swift
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar binario (Debug)
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -rq app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: app.ipa
          retention-days: 1
