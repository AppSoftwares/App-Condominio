name: iOS Build IPA

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Nombre del archivo base'
        required: true
        default: 'CaminosApp'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version found: $VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Create .env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Build Web Project
        run: pnpm run build:ci

      - name: Generate Assets
        run: |
          pnpm exec capacitor-assets generate --iconBackgroundColor '#0f5551' --iconBackgroundColorDark '#0f5551'
          find android/app/src/main/res -name "*.webp" -delete || true
          rm -rf ios/App/CapApp-SPM

      - name: Capacitor Sync
        run: pnpm exec cap sync ios

      - name: Install CocoaPods Dependencies
        run: |
          cd ios/App
          pod install
          ls -la Podfile.lock

      - name: Build Android App (Release)
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: Prepare Artifacts
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          mv android/app/build/outputs/apk/release/CaminosApp-v$VERSION.apk "CaminosApp $VERSION.apk"

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App || true
          
          xcodebuild -workspace App.xcworkspace \
                    -scheme App \
                    -configuration Debug \
                    -destination 'generic/platform=iOS' \
                    -sdk iphoneos \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    COMPILER_INDEX_STORE_ENABLE=NO \
                    ENABLE_USER_SCRIPT_SANDBOXING=NO \
                    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
                    IBTOOL_NO_STORYBOARD_VALIDATION=YES \
                    CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
                    ONLY_ACTIVE_ARCH=NO \
                    build

      - name: Create IPA for Sideloadly
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -rq "CaminosApp $VERSION.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: "CaminosApp v${{ steps.package-version.outputs.version }}"
          files: |
            *.ipa
            *.apk
          body: |
            Actualización CaminosApp v${{ steps.package-version.outputs.version }}
            
            Notas de lanzamiento:
            - Corrección de compatibilidad en el proceso de construcción para MacOS ARM64.
            - Automatización mejorada para nombres de archivos y generación de releases.
            - Incremento de versión interna para auto-actualización.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
