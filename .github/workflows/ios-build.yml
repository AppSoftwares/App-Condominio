name: iOS Build IPA

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Nombre del archivo IPA (ej. CaminosApp-v1)'
        required: true
        default: 'CaminosApp'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web Project
        run: pnpm run build:ci

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          xcodebuild -project App.xcodeproj \
                    -scheme App \
                    -configuration Debug \
                    -destination 'generic/platform=iOS' \
                    -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                    CODE_SIGNING_ALLOWED=NO \
                    COMPILER_INDEX_STORE_ENABLE=NO \
                    -quiet build

      - name: Create IPA for Sideloadly
        run: |
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el binario .app"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -rq "${{ inputs.build_id }}.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.build_id }}-Artifact
          path: "*.ipa"
          retention-days: 1