name: iOS Build (Final Support)

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
        default: 'v1'

env:
  # Forzar Node 24 para evitar el error de entorno de GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          # Limpieza total para evitar conflictos de versiones
          rm -f pnpm-lock.yaml package-lock.json .npmrc
          npm install --legacy-peer-deps

      - name: Build Web Project
        run: |
          # Usamos vite directo para saltar errores de TypeScript (tsc)
          npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Resolver dependencias de SPM (Capacitor 6)
          xcodebuild -resolvePackageDependencies -project App.xcodeproj
          
          # Compilar el proyecto directamente
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath "${GITHUB_WORKSPACE}/DerivedData" \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     -quiet build
          
          # Empaquetar el .ipa
          APP_PATH=$(find "${GITHUB_WORKSPACE}/DerivedData/Build/Products/Debug-iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se pudo localizar el archivo .app"
            exit 1
          fi
          
          mkdir -p "${GITHUB_WORKSPACE}/build/Payload"
          cp -R "$APP_PATH" "${GITHUB_WORKSPACE}/build/Payload/"
          cd "${GITHUB_WORKSPACE}/build"
          zip -rq "${{ inputs.build_id }}.ipa" Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/*.ipa
          retention-days: 1
