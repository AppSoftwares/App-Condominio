<style>
        body {
            background-color: #2F6D69;
            color: white;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .cinzel-font {
            font-family: 'Cinzel', serif;
        }
        .welcome-bg {
            background: linear-gradient(rgba(47, 109, 105, 0.9), rgba(47, 109, 105, 0.9)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuBcbvZDDo0T_0wDyT_PYJVGqDNBAxtIjBv3bSGWh6KNk9DSCLk_AKpN4FRiFbvq1bPZsgDk3D47671D39xbXII1TlEwqdq8EFpoMSDawb9yFTSDfnFNAO-XIpU_bwLHfIKmN8t-GaILN6SOhDYG9jlk-h6MwgnZ-8OtBcVrNs2T-THiJqffrqRTV0IVIIbVYK7F7ptnVXarj-GvBf0ksJDk5v5--SYsMx8W_xusghrDluU7FelQzuyubB9KtRwW7UbOxN-lyaGuAf4');
            background-size: cover;
            background-position: center;
        }
        .architectural-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .circular-button-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
        }
        .circular-button {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #C6A059;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            color: #00201e;
        }
        .circular-button:hover {
            transform: scale(1.05);
            background-color: #ffdea6;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-animation {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-center items-center relative welcome-bg">
<!-- Architectural Watermark Overlay -->
<div class="absolute inset-0 architectural-pattern pointer-events-none"></div>
<main class="relative z-10 w-full max-w-lg px-6 flex flex-col items-center justify-between h-full py-20">
<!-- Header Branding -->
<div class="flex flex-col items-center space-y-8 mt-10">
<div class="w-32 h-32 float-animation">
<img alt="Caminos de la Lagunita Brand Mark" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8QsGNY_Q0aq1KaT-hJeFsbP4mRDomcQ19BW-zuVYjVkb6eac8rVaAJgrbgjV1BCYpVyyKjJzoH36qm0d4H3skuvIPSjKU5t8GcKDMNLDBaIiEY-nz8q-UMjry88UdO-r6NhCoKBvnDpbOXysRkWPuX072rdgZwm1sgyeex05EJtuPr4wI-Cejn53p67SD85te5omuI7vj63weNdKASAD4HFzTcNmAJCZR7hQgo_zpVH-Iz6m5J7eZu9yHN3BzObk0cTxuqgPVS-Y"/>
</div>
<div class="text-center">
<h1 class="cinzel-font text-white tracking-[0.3em] text-2xl md:text-3xl font-bold leading-tight">
                    CAMINO DE LA<br/>LAGUNITA
                </h1>
<div class="h-px w-24 bg-[#C6A059] mx-auto mt-4"></div>
</div>
</div>
<!-- Central Hero Element -->
<div class="relative group">
<div class="absolute inset-0 bg-[#C6A059] rounded-full blur-3xl opacity-10 group-hover:opacity-20 transition-opacity"></div>
<div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full overflow-hidden border-4 border-[#C6A059]/30 p-2 glass-panel">
<div class="w-full h-full rounded-full overflow-hidden grayscale contrast-125">
<img alt="Iconic Residential Tower at Caminos de la Lagunita" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIapTPtAfQckIu-4za_9ThJ0Uw5w82iV68fiBpjI3MIle3ECweEYscc8d6IvJ1uh9I0JX34XVPisq9sVmqs8-sHvUXoPsQSUw_yvb8oByL6QL31_jJH9I45MvRx90MigjefiaD0XSX_duTBhr-3ohBvj63jJCRVi8mqRbMBi_aSnNq8P1z90VnLTlXsP196QZJhjXTN9KmLrhB6YBTwPLyUF9q2YfvrdfaNcmg3oAcUufWsM1Wezr9Ry993sJPg4tvaWOeRUJYj3c"/>
</div>
</div>
</div>
<!-- Footer / Action Area -->
<div class="w-full text-center relative pt-20">
<p class="font-body-md text-white/70 tracking-widest uppercase text-sm mb-12">
                Experiencia Residencial Premium
            </p>
<div class="circular-button-container">
<button class="circular-button group" onclick="window.location.reload()">
<div class="flex flex-col items-center">
<span class="text-xs font-bold tracking-widest mb-1">ENTRAR</span>
<span class="material-symbols-outlined text-3xl transition-transform group-hover:translate-y-1" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
</button>
</div>
</div>
</main>
<!-- Side Accents for Desktop -->
<div class="hidden lg:block absolute left-10 top-1/2 -translate-y-1/2 vertical-text">
<p class="text-white/20 uppercase tracking-[1em] font-label-sm [writing-mode:vertical-lr] rotate-180">RESIDENCIAL • EXCLUSIVO • SEGURO</p>
</div>
<div class="hidden lg:block absolute right-10 top-1/2 -translate-y-1/2 vertical-text">
<p class="text-white/20 uppercase tracking-[1em] font-label-sm [writing-mode:vertical-lr]">BIENVENIDO A CASA</p>
</div>
<!-- Decorative Corner Elements -->
<div class="absolute top-8 left-8 w-16 h-16 border-t border-l border-white/20"></div>
<div class="absolute top-8 right-8 w-16 h-16 border-t border-r border-white/20"></div>
<script>
        // Micro-interactions for atmosphere
        document.addEventListener('mousemove', (e) => {
            const pattern = document.querySelector('.architectural-pattern');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            pattern.style.transform = `translate(${x * 5}px, ${y * 5}px)`;
        });

        // Interactive Button Effect
        const btn = document.querySelector('.circular-button');
        btn.addEventListener('mousedown', () => {
            btn.style.transform = 'scale(0.92) translateY(5px)';
        });
        btn.addEventListener('mouseup', () => {
            btn.style.transform = 'scale(1.05) translateY(0px)';
        });
    </script>
</body></html>
